<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VaultWares</title>
</head>
<body>
    <header class="header">
        <div class="logo">
            <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
            <span class="logo-text">VaultWares</span>
        </div>
        <button id="btn-open-vault" class="btn-icon" title="Open full vault" aria-label="Open full vault">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="7" height="7" rx="1"/>
                <rect x="14" y="3" width="7" height="7" rx="1"/>
                <rect x="3" y="14" width="7" height="7" rx="1"/>
                <rect x="14" y="14" width="7" height="7" rx="1"/>
            </svg>
        </button>
    </header>

    <main>
        <section id="detection-banner" class="banner banner-hidden" aria-live="polite">
            <div class="banner-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="12" y1="8" x2="12" y2="12"/>
                    <line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
            </div>
            <div id="detection-text" class="banner-text">Checking page…</div>
        </section>

        <section class="actions">
            <button id="btn-fill" class="btn btn-primary" type="button">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 20h9"/>
                    <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/>
                </svg>
                Auto-fill Form
            </button>
            <button id="btn-generate" class="btn btn-secondary" type="button">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="23 4 23 10 17 10"/>
                    <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
                </svg>
                New Identity
            </button>
        </section>

        <section class="password-section">
            <div class="section-title">Quick Password</div>
            <div class="password-row">
                <input id="password-display" class="password-input" type="text" readonly aria-label="Generated password" />
                <button id="btn-copy-pw" class="btn-icon" title="Copy password" aria-label="Copy password">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="9" y="9" width="13" height="13" rx="2"/>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                    </svg>
                </button>
                <button id="btn-refresh-pw" class="btn-icon" title="Generate new" aria-label="Generate new password">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="23 4 23 10 17 10"/>
                        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
                    </svg>
                </button>
            </div>
            <div class="strength-bar-wrap">
                <div id="strength-bar" class="strength-bar"></div>
            </div>
            <div id="strength-label" class="strength-label"></div>
        </section>

        <section class="stats-row">
            <div class="stat-card">
                <span id="stat-identities" class="stat-value">–</span>
                <span class="stat-label">Identities</span>
            </div>
            <div class="stat-card">
                <span id="stat-credentials" class="stat-value">–</span>
                <span class="stat-label">Credentials</span>
            </div>
        </section>
    </main>
</body>
</html>
